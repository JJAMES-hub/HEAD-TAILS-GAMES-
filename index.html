<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heads or Tails</title>
    <link rel="stylesheet" href="styles.css">
    <script src="core.js"></script>
</head>

<body>
<h1 class="heading">HEAD TAILS GAME</h1>
 <p id="choiceText" class="choice">Make a move</p>
    <button onclick="gamePlay('heads')">HEADS</button>
    <button onclick="gamePlay('tails')">TAILS</button>
    <button onclick="
    score.win= 0;
    score.lose= 0;
localStorage.removeItem('score')
location.reload();
     updateScoreElement();
">RESET SCORE</button>

 
    <div class="results">
        <p class="js-score"></p>
        <p class="js-challenge"></p>
        <p class="js-choice"></p>
        <p class="js-result"></p>
    </div>


        
</body>

</html>
